<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encre Vivante — Roman Interactif</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1410;
    --parchment: #f5f0e8;
    --aged: #e8dfc8;
    --sepia: #8b6914;
    --sepia-light: #c4922a;
    --accent: #2c4a3e;
    --accent-soft: #4a7c6f;
    --text-muted: #6b5d4a;
    --paper: #faf7f2;
  }

  body {
    background: var(--ink);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    border-bottom: 1px solid #2e2820;
  }
  .logo-quill {
    font-size: 1.8rem;
    filter: sepia(1) hue-rotate(10deg);
  }
  .logo-text {
    font-family: 'Playfair Display', serif;
    color: var(--sepia-light);
    font-size: 1.4rem;
    letter-spacing: 0.04em;
  }
  .logo-sub {
    color: #5a4f40;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: -2px;
  }

  /* ── MAIN LAYOUT ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 0;
    height: calc(100vh - 73px);
  }

  /* ── SIDEBAR ── */
  aside {
    background: #120f0a;
    border-right: 1px solid #2e2820;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }
  aside h2 {
    font-family: 'Playfair Display', serif;
    color: var(--sepia-light);
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid #2e2820;
  }

  /* Genre */
  .genre-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.4rem;
  }
  .genre-btn {
    background: #1e1a14;
    border: 1px solid #2e2820;
    color: #8a7a65;
    padding: 0.4rem 0.5rem;
    border-radius: 4px;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
    text-align: center;
  }
  .genre-btn:hover { border-color: var(--sepia); color: var(--sepia-light); }
  .genre-btn.active { background: var(--accent); border-color: var(--accent-soft); color: #c8e8e0; }

  /* Characters */
  #char-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .char-card {
    background: #1e1a14;
    border: 1px solid #2e2820;
    border-radius: 6px;
    padding: 0.7rem 0.8rem;
    position: relative;
  }
  .char-name {
    font-family: 'Playfair Display', serif;
    color: var(--parchment);
    font-size: 0.9rem;
    margin-bottom: 0.15rem;
  }
  .char-role {
    color: var(--sepia);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .char-desc { color: #7a6d5a; font-size: 0.72rem; margin-top: 0.3rem; line-height: 1.4; }
  .char-remove {
    position: absolute;
    top: 0.4rem; right: 0.5rem;
    background: none; border: none;
    color: #3a3028; cursor: pointer;
    font-size: 0.8rem;
    transition: color 0.2s;
  }
  .char-remove:hover { color: #8b3a3a; }

  /* Add character form */
  .add-char-btn {
    background: none;
    border: 1px dashed #2e2820;
    color: #5a4f40;
    padding: 0.5rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.75rem;
    width: 100%;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .add-char-btn:hover { border-color: var(--sepia); color: var(--sepia); }

  .char-form { display: flex; flex-direction: column; gap: 0.4rem; }
  .char-form input, .char-form select, .char-form textarea {
    background: #1e1a14;
    border: 1px solid #2e2820;
    color: var(--parchment);
    padding: 0.4rem 0.6rem;
    border-radius: 4px;
    font-size: 0.75rem;
    font-family: 'Inter', sans-serif;
    resize: none;
    outline: none;
  }
  .char-form input::placeholder, .char-form textarea::placeholder { color: #4a4035; }
  .char-form input:focus, .char-form textarea:focus { border-color: var(--sepia); }
  .char-form select option { background: #1e1a14; }
  .form-actions { display: flex; gap: 0.4rem; }
  .btn-sm {
    flex: 1; padding: 0.4rem; border-radius: 4px;
    font-size: 0.72rem; cursor: pointer; border: none;
    font-family: 'Inter', sans-serif; transition: all 0.2s;
  }
  .btn-confirm { background: var(--accent); color: #c8e8e0; }
  .btn-confirm:hover { background: var(--accent-soft); }
  .btn-cancel { background: #2e2820; color: #8a7a65; }
  .btn-cancel:hover { background: #3a3028; }

  /* ── STORY PANEL ── */
  .story-panel {
    display: flex;
    flex-direction: column;
    background: var(--paper);
  }

  /* Book pages */
  .pages-container {
    flex: 1;
    overflow-y: auto;
    padding: 2.5rem 3rem;
    background: var(--paper);
    background-image:
      repeating-linear-gradient(
        transparent,
        transparent 31px,
        #e8e0d0 31px,
        #e8e0d0 32px
      );
    background-position: 0 42px;
    line-height: 2rem;
  }

  .story-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--ink);
    text-align: center;
    margin-bottom: 0.3rem;
    line-height: 1.2;
  }
  .story-title-label {
    color: var(--text-muted);
    font-size: 0.72rem;
    text-align: center;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 2rem;
    font-style: italic;
  }

  .story-block {
    margin-bottom: 0.5rem;
  }
  .story-block p {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--ink);
    line-height: 2rem;
    text-align: justify;
    margin-bottom: 0;
  }
  .story-block p.ai-text {
    color: #1a1410;
  }
  .story-block p.user-action {
    font-style: italic;
    color: var(--accent);
    font-family: 'Playfair Display', serif;
  }
  .story-block p.user-action::before { content: "— "; }

  .chapter-break {
    text-align: center;
    color: var(--sepia);
    font-size: 1rem;
    margin: 1.5rem 0;
    letter-spacing: 0.3em;
  }

  /* Typing indicator */
  .typing-indicator {
    display: none;
    align-items: center;
    gap: 0.3rem;
    padding: 0.5rem 0;
  }
  .typing-indicator.visible { display: flex; }
  .typing-indicator span {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--text-muted);
    font-size: 0.85rem;
  }
  .dot { width: 4px; height: 4px; background: var(--sepia); border-radius: 50%; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

  /* ── INPUT ZONE ── */
  .input-zone {
    background: var(--aged);
    border-top: 2px solid #c4ad88;
    padding: 1rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }
  .input-label {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 500;
  }
  .input-row { display: flex; gap: 0.7rem; align-items: flex-end; }
  #user-input {
    flex: 1;
    background: var(--parchment);
    border: 1px solid #c4ad88;
    border-radius: 6px;
    padding: 0.7rem 1rem;
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    color: var(--ink);
    resize: none;
    outline: none;
    min-height: 60px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  #user-input::placeholder { color: #b0a08a; font-style: italic; }
  #user-input:focus { border-color: var(--sepia); }

  .send-btn {
    background: var(--ink);
    color: var(--sepia-light);
    border: none;
    border-radius: 6px;
    padding: 0.7rem 1.2rem;
    cursor: pointer;
    font-size: 1.1rem;
    transition: all 0.2s;
    white-space: nowrap;
    height: 60px;
  }
  .send-btn:hover { background: var(--accent); color: #c8e8e0; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Quick actions */
  .quick-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .quick-btn {
    background: none;
    border: 1px solid #c4ad88;
    color: var(--text-muted);
    padding: 0.25rem 0.7rem;
    border-radius: 20px;
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .quick-btn:hover { border-color: var(--sepia); color: var(--sepia); background: rgba(196,146,42,0.08); }

  /* Welcome state */
  .welcome-state {
    text-align: center;
    padding: 3rem 2rem;
    max-width: 480px;
    margin: auto;
  }
  .welcome-state .quill { font-size: 3rem; margin-bottom: 1rem; }
  .welcome-state h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--ink);
    margin-bottom: 0.7rem;
  }
  .welcome-state p {
    color: var(--text-muted);
    font-size: 0.9rem;
    line-height: 1.6;
    margin-bottom: 1.5rem;
  }
  .start-btn {
    background: var(--ink);
    color: var(--sepia-light);
    border: none;
    border-radius: 6px;
    padding: 0.8rem 2rem;
    font-size: 0.9rem;
    cursor: pointer;
    font-family: 'Playfair Display', serif;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .start-btn:hover { background: var(--accent); color: #c8e8e0; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #c4ad88; border-radius: 3px; }

  @media (max-width: 700px) {
    main { grid-template-columns: 1fr; }
    aside { display: none; }
    .pages-container { padding: 1.5rem 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-quill">🪶</div>
  <div>
    <div class="logo-text">Encre Vivante</div>
    <div class="logo-sub">Roman Interactif</div>
  </div>
</header>

<main>
  <!-- SIDEBAR -->
  <aside>
    <div>
      <h2>Genre</h2>
      <div class="genre-grid" id="genre-grid">
        <button class="genre-btn active" data-genre="Fantaisie">⚔️ Fantaisie</button>
        <button class="genre-btn" data-genre="Thriller">🔪 Thriller</button>
        <button class="genre-btn" data-genre="Romance">💌 Romance</button>
        <button class="genre-btn" data-genre="Science-fiction">🚀 Sci-Fi</button>
        <button class="genre-btn" data-genre="Horreur">👻 Horreur</button>
        <button class="genre-btn" data-genre="Historique">🏰 Historique</button>
      </div>
    </div>

    <div>
      <h2>Personnages</h2>
      <div id="char-list"></div>
      <div id="char-form-area" style="margin-top:0.5rem">
        <button class="add-char-btn" id="show-add-char">+ Ajouter un personnage</button>
      </div>
    </div>

    <div>
      <h2>Titre de l'histoire</h2>
      <input type="text" id="story-title-input" placeholder="Mon roman..." style="width:100%;background:#1e1a14;border:1px solid #2e2820;color:var(--parchment);padding:0.4rem 0.6rem;border-radius:4px;font-size:0.8rem;font-family:'Inter',sans-serif;outline:none;">
    </div>
  </aside>

  <!-- STORY PANEL -->
  <div class="story-panel">
    <div class="pages-container" id="pages">
      <div class="welcome-state" id="welcome">
        <div class="quill">🪶</div>
        <h1>Votre histoire commence ici</h1>
        <p>Ajoutez vos personnages dans le panneau de gauche, choisissez un genre, puis donnez le premier souffle à votre roman.</p>
        <button class="start-btn" id="start-btn">Commencer l'histoire</button>
      </div>
      <div id="story-content" style="display:none">
        <div class="story-title" id="story-title-display">Sans titre</div>
        <div class="story-title-label" id="genre-display">Fantaisie</div>
        <div class="chapter-break">✦ ✦ ✦</div>
        <div id="story-blocks"></div>
        <div class="typing-indicator" id="typing">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
          <span>L'auteur écrit…</span>
        </div>
      </div>
    </div>

    <div class="input-zone">
      <div class="input-label">Que se passe-t-il ensuite ?</div>
      <div class="quick-actions" id="quick-actions">
        <button class="quick-btn" data-action="Décrivez ce que je vois autour de moi.">🌍 Décrire le lieu</button>
        <button class="quick-btn" data-action="Une rencontre inattendue survient.">🤝 Rencontre</button>
        <button class="quick-btn" data-action="Un danger soudain apparaît !">⚠️ Danger</button>
        <button class="quick-btn" data-action="Je fouille les lieux à la recherche d'indices.">🔍 Fouiller</button>
        <button class="quick-btn" data-action="Je parle à l'un des personnages.">💬 Dialogue</button>
        <button class="quick-btn" data-action="Une révélation surprenante se produit.">✨ Révélation</button>
      </div>
      <div class="input-row">
        <textarea id="user-input" rows="2" placeholder="Décrivez votre action, ou laissez l'histoire vous surprendre…"></textarea>
        <button class="send-btn" id="send-btn">✍️ Écrire</button>
      </div>
    </div>
  </div>
</main>

<script>
  // ── STATE ──
  let genre = 'Fantaisie';
  let characters = [];
  let storyHistory = []; // [{role, content}]
  let storyStarted = false;
  let isLoading = false;

  // ── GENRE ──
  document.querySelectorAll('.genre-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      genre = btn.dataset.genre;
    });
  });

  // ── CHARACTERS ──
  function renderChars() {
    const list = document.getElementById('char-list');
    list.innerHTML = '';
    characters.forEach((c, i) => {
      const card = document.createElement('div');
      card.className = 'char-card';
      card.innerHTML = `
        <div class="char-name">${c.name}</div>
        <div class="char-role">${c.role}</div>
        ${c.desc ? `<div class="char-desc">${c.desc}</div>` : ''}
        <button class="char-remove" onclick="removeChar(${i})">✕</button>
      `;
      list.appendChild(card);
    });
  }

  function removeChar(i) {
    characters.splice(i, 1);
    renderChars();
  }

  let addFormVisible = false;
  document.getElementById('show-add-char').addEventListener('click', () => {
    if (addFormVisible) return;
    addFormVisible = true;
    const area = document.getElementById('char-form-area');
    area.innerHTML = `
      <div class="char-form">
        <input id="cf-name" placeholder="Nom du personnage" maxlength="40">
        <select id="cf-role">
          <option value="Protagoniste">Protagoniste</option>
          <option value="Antagoniste">Antagoniste</option>
          <option value="Allié">Allié</option>
          <option value="Mystérieux">Mystérieux</option>
          <option value="Mentor">Mentor</option>
          <option value="Personnage secondaire">Secondaire</option>
        </select>
        <textarea id="cf-desc" rows="2" placeholder="Description courte (optionnel)…"></textarea>
        <div class="form-actions">
          <button class="btn-sm btn-confirm" id="cf-confirm">Ajouter</button>
          <button class="btn-sm btn-cancel" id="cf-cancel">Annuler</button>
        </div>
      </div>
    `;
    document.getElementById('cf-confirm').addEventListener('click', () => {
      const name = document.getElementById('cf-name').value.trim();
      if (!name) return;
      characters.push({
        name,
        role: document.getElementById('cf-role').value,
        desc: document.getElementById('cf-desc').value.trim()
      });
      renderChars();
      resetAddForm();
    });
    document.getElementById('cf-cancel').addEventListener('click', resetAddForm);
  });

  function resetAddForm() {
    addFormVisible = false;
    document.getElementById('char-form-area').innerHTML = `<button class="add-char-btn" id="show-add-char">+ Ajouter un personnage</button>`;
    document.getElementById('show-add-char').addEventListener('click', arguments.callee.caller);
    // Re-attach via delegation
    document.getElementById('show-add-char').addEventListener('click', () => document.getElementById('show-add-char').click());
    // Simple re-init
    document.getElementById('show-add-char').onclick = () => {
      document.getElementById('show-add-char').dispatchEvent(new Event('click'));
    };
    // Just reload listener
    initAddBtn();
  }

  function initAddBtn() {
    const btn = document.getElementById('show-add-char');
    if (btn) btn.addEventListener('click', addCharHandler);
  }

  function addCharHandler() {
    if (addFormVisible) return;
    addFormVisible = true;
    const area = document.getElementById('char-form-area');
    area.innerHTML = `
      <div class="char-form">
        <input id="cf-name" placeholder="Nom du personnage" maxlength="40">
        <select id="cf-role">
          <option value="Protagoniste">Protagoniste</option>
          <option value="Antagoniste">Antagoniste</option>
          <option value="Allié">Allié</option>
          <option value="Mystérieux">Mystérieux</option>
          <option value="Mentor">Mentor</option>
          <option value="Personnage secondaire">Secondaire</option>
        </select>
        <textarea id="cf-desc" rows="2" placeholder="Description courte (optionnel)…"></textarea>
        <div class="form-actions">
          <button class="btn-sm btn-confirm" id="cf-confirm">Ajouter</button>
          <button class="btn-sm btn-cancel" id="cf-cancel">Annuler</button>
        </div>
      </div>
    `;
    document.getElementById('cf-confirm').addEventListener('click', () => {
      const name = document.getElementById('cf-name').value.trim();
      if (!name) return;
      characters.push({
        name,
        role: document.getElementById('cf-role').value,
        desc: document.getElementById('cf-desc').value.trim()
      });
      renderChars();
      addFormVisible = false;
      document.getElementById('char-form-area').innerHTML = `<button class="add-char-btn" id="show-add-char">+ Ajouter un personnage</button>`;
      initAddBtn();
    });
    document.getElementById('cf-cancel').addEventListener('click', () => {
      addFormVisible = false;
      document.getElementById('char-form-area').innerHTML = `<button class="add-char-btn" id="show-add-char">+ Ajouter un personnage</button>`;
      initAddBtn();
    });
  }
  initAddBtn();

  // ── STORY ──
  function buildSystemPrompt() {
    const charList = characters.length
      ? characters.map(c => `- ${c.name} (${c.role})${c.desc ? ': ' + c.desc : ''}`).join('\n')
      : '- Aucun personnage défini (invente-les avec créativité)';

    return `Tu es un auteur de romans interactifs en français, expert du genre "${genre}". 
Tu co-écris une histoire avec le lecteur en temps réel.

PERSONNAGES :
${charList}

RÈGLES :
- Écris en français, style littéraire soigné, prose riche et immersive.
- Chaque réponse : 2 à 4 paragraphes narratifs (environ 150-250 mots).
- Intègre les personnages définis de manière organique.
- Fais avancer l'intrigue à chaque échange, crée du suspense et de l'émotion.
- Termine toujours sur un moment ouvert qui invite le lecteur à agir ou choisir.
- N'écris PAS de titre de chapitre, juste la prose narrative.
- Ne commente jamais l'histoire en dehors du récit. Reste dans le roman.`;
  }

  async function callClaude(userMessage) {
    storyHistory.push({ role: 'user', content: userMessage });

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: buildSystemPrompt(),
        messages: storyHistory
      })
    });

    const data = await response.json();
    const aiText = data.content?.[0]?.text || 'Une erreur mystérieuse interrompt le récit…';
    storyHistory.push({ role: 'assistant', content: aiText });
    return aiText;
  }

  function addStoryBlock(text, type = 'ai') {
    const blocks = document.getElementById('story-blocks');
    const div = document.createElement('div');
    div.className = 'story-block';
    const p = document.createElement('p');
    p.className = type === 'ai' ? 'ai-text' : 'user-action';
    p.textContent = text;
    div.appendChild(p);
    blocks.appendChild(div);
    scrollToBottom();
  }

  function scrollToBottom() {
    const pages = document.getElementById('pages');
    pages.scrollTop = pages.scrollHeight;
  }

  function setLoading(v) {
    isLoading = v;
    document.getElementById('typing').classList.toggle('visible', v);
    document.getElementById('send-btn').disabled = v;
    if (v) scrollToBottom();
  }

  async function startStory() {
    document.getElementById('welcome').style.display = 'none';
    document.getElementById('story-content').style.display = 'block';

    const title = document.getElementById('story-title-input').value.trim() || 'Sans titre';
    document.getElementById('story-title-display').textContent = title;
    document.getElementById('genre-display').textContent = `${genre} · Roman Interactif`;

    storyStarted = true;
    setLoading(true);

    try {
      const opening = await callClaude("Commence l'histoire. Écris l'incipit du roman, installe l'atmosphère et introduis les personnages.");
      addStoryBlock(opening, 'ai');
    } catch (e) {
      addStoryBlock("Une erreur est survenue. Vérifiez votre connexion.", 'ai');
    }
    setLoading(false);
  }

  async function sendAction() {
    if (isLoading) return;
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;

    if (!storyStarted) {
      await startStory();
      return;
    }

    input.value = '';
    addStoryBlock(text, 'user');
    setLoading(true);

    try {
      const response = await callClaude(text);
      addStoryBlock(response, 'ai');
    } catch (e) {
      addStoryBlock("Le fil narratif s'est rompu… réessayez.", 'ai');
    }
    setLoading(false);
  }

  document.getElementById('start-btn').addEventListener('click', startStory);
  document.getElementById('send-btn').addEventListener('click', sendAction);
  document.getElementById('user-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAction(); }
  });

  // Quick actions
  document.getElementById('quick-actions').addEventListener('click', e => {
    if (e.target.classList.contains('quick-btn')) {
      const action = e.target.dataset.action;
      document.getElementById('user-input').value = action;
      if (storyStarted) sendAction();
    }
  });
</script>
</body>
</html>
